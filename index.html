<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>anna.exe — Content Cockpit</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=Schibsted+Grotesk:wght@500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
:root{
  /* neutrals — warm paper + ink */
  --bg:#F1EFE8;
  --bg-2:#EAE8E0;
  --surface:#FFFFFF;
  --surface-2:#FAF9F4;
  --surface-3:#F4F2EB;
  --border:#E5E2D8;
  --border-2:#D6D2C5;
  --border-strong:#C4BFAF;
  --ink:#1A1813;
  --ink-2:#5C584C;
  --ink-3:#928D7E;
  --ink-on-dark:#F3F1E9;

  /* brand spark — stage spotlight amber */
  --accent:#E08A1E;
  --accent-deep:#B96E10;
  --accent-soft:#FBEAD0;
  --accent-tint:#FDF4E6;

  /* ink chrome (primary actions) */
  --ink-btn:#211F18;
  --ink-btn-hover:#37342A;

  /* KPI data palette — muted, calm, distinguishable */
  --amp:#1E8A86;     --amp-soft:#DDF0EE;
  --hook:#CC5B43;    --hook-soft:#F8E4DE;
  --compl:#6E8B45;   --compl-soft:#E9F0DC;
  --cvr:#C2912A;     --cvr-soft:#F6ECCF;
  --save:#7868AE;    --save-soft:#EAE5F4;

  /* status */
  --good:#2E875A;    --good-soft:#DBEEE3;
  --ok:#C2912A;      --ok-soft:#F6ECCF;
  --bad:#C24A35;     --bad-soft:#F6E2DC;

  --radius-xs:7px;
  --radius-sm:10px;
  --radius-md:14px;
  --radius-lg:20px;
  --radius-pill:999px;

  --shadow-xs:0 1px 2px rgba(26,24,19,.05);
  --shadow-sm:0 1px 3px rgba(26,24,19,.06), 0 1px 2px rgba(26,24,19,.04);
  --shadow-md:0 6px 18px rgba(26,24,19,.07), 0 2px 6px rgba(26,24,19,.04);
  --shadow-lg:0 18px 44px rgba(26,24,19,.12), 0 6px 14px rgba(26,24,19,.06);

  --font-sans:'Hanken Grotesk', system-ui, sans-serif;
  --font-display:'Schibsted Grotesk', system-ui, sans-serif;
  --font-mono:'JetBrains Mono', ui-monospace, monospace;

  --ease:cubic-bezier(.2,.7,.2,1);

  --nav-w:236px;
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:var(--font-sans);
  background:var(--bg);
  color:var(--ink);
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  font-size:15px;
  line-height:1.5;
}
#root{min-height:100vh;}

h1,h2,h3,h4{font-family:var(--font-display);margin:0;letter-spacing:-.02em;color:var(--ink);}
.num{font-variant-numeric:tabular-nums;font-feature-settings:"tnum" 1,"cv01" 1;}
.mono{font-family:var(--font-mono);}

button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
input,select,textarea{font-family:inherit;font-size:inherit;color:inherit;}
::selection{background:var(--accent-soft);}

/* scrollbars */
*::-webkit-scrollbar{width:10px;height:10px;}
*::-webkit-scrollbar-thumb{background:var(--border-2);border-radius:99px;border:3px solid transparent;background-clip:content-box;}
*::-webkit-scrollbar-thumb:hover{background:var(--border-strong);background-clip:content-box;}

/* ---------- shared atoms ---------- */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);box-shadow:var(--shadow-sm);}
.eyebrow{font-size:10.5px;font-weight:600;letter-spacing:.09em;text-transform:uppercase;color:var(--ink-3);line-height:1.25;}

.btn{
  display:inline-flex;align-items:center;gap:8px;justify-content:center;
  height:40px;padding:0 16px;border-radius:var(--radius-sm);
  font-weight:600;font-size:14px;line-height:1;
  transition:background .16s var(--ease), transform .12s var(--ease), border-color .16s var(--ease), color .16s var(--ease);
  white-space:nowrap;
}
.btn:active{transform:scale(.98);}
.btn-primary{background:var(--ink-btn);color:var(--ink-on-dark);}
.btn-primary:hover{background:var(--ink-btn-hover);}
.btn-ghost{background:transparent;color:var(--ink-2);border:1px solid var(--border-2);}
.btn-ghost:hover{background:var(--surface-2);border-color:var(--border-strong);color:var(--ink);}
.btn-accent{background:var(--accent);color:#2A1B05;}
.btn-accent:hover{background:var(--accent-deep);color:#fff;}
.btn-icon{width:40px;height:40px;padding:0;border-radius:var(--radius-sm);}

.chip{
  display:inline-flex;align-items:center;gap:6px;height:30px;padding:0 12px;
  border-radius:var(--radius-pill);font-size:12.5px;font-weight:500;
  background:var(--surface-2);border:1px solid var(--border);color:var(--ink-2);
  transition:all .14s var(--ease);white-space:nowrap;
}
.chip:hover{border-color:var(--border-strong);color:var(--ink);}
.chip.active{background:var(--ink-btn);border-color:var(--ink-btn);color:var(--ink-on-dark);}

.badge{display:inline-flex;align-items:center;gap:5px;height:22px;padding:0 8px;border-radius:6px;font-size:11.5px;font-weight:600;letter-spacing:.01em;}
.badge-good{background:var(--good-soft);color:var(--good);}
.badge-ok{background:var(--ok-soft);color:var(--accent-deep);}
.badge-bad{background:var(--bad-soft);color:var(--bad);}
.badge-none{background:var(--surface-3);color:var(--ink-3);}

.icon{width:18px;height:18px;stroke-width:2;flex:none;}
.icon-sm{width:15px;height:15px;stroke-width:2;flex:none;}

/* dot status */
.dot{width:8px;height:8px;border-radius:50%;flex:none;}

/* fade/slide-in for view transitions */
@keyframes fadeUp{from{transform:translateY(9px);}to{transform:none;}}
.fade-up{animation:fadeUp .4s var(--ease);}

@media (max-width:860px){
  :root{--nav-w:0px;}
}
</style>
</head>
<body>
<div id="root"></div>

<!-- React + Babel (pinned) -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- data + logic (plain JS) -->
<script src="lib.js"></script>

<!-- app modules (Babel) -->
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="bundle.jsx"></script>
</body>
</html>
